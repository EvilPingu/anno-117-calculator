<div id="product-config-dialog" class="modal fade" role="dialog" tabindex="-1" aria-hidden="true" data-bind="debug: 'Product Config Dialog', with: $root.selectedProduct()">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <img class="icon-md mr-2" data-bind="component: {name: 'asset-icon', params: $data}">
                <h4 data-bind="text: $data.name()"></h4>
                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
            </div>

            <div class="modal-body">
                <!-- Supplier Selection Section -->
                <div class="mb-4 p-3" style="background-color: rgba(0,0,0,0.05); border-radius: 4px;">
                    <h5 data-bind="text: $root.texts.defaultSupplier ? $root.texts.defaultSupplier.name : 'Default Supplier'"></h5>
                    <div class="row">
                        <div class="col-md-8">
                            <label data-bind="text: $root.texts.selectSupplier ? $root.texts.selectSupplier.name : 'Select Supplier'"></label>
                            <select class="custom-select"
                                    data-bind="options: $data.availableSuppliers,
                                               optionsText: 'label',
                                               value: $data.selectedSupplierOption,
                                               optionsAfterRender: function(option, item) {
                                                   if (item && item.icon) {
                                                       $(option).prepend($('<img>').attr('src', item.icon).css({width: '20px', height: '20px', marginRight: '8px'}));
                                                   }
                                               }">
                            </select>
                            <button class="btn btn-primary mt-2"
                                    data-bind="click: () => $data.selectSupplier($data.selectedSupplierOption()), enable: $data.selectedSupplierOption()">
                                <span class="fa fa-check"></span>
                                <span data-bind="text: $root.texts.apply ? $root.texts.apply.name : 'Apply'"></span>
                            </button>
                        </div>
                        <div class="col-md-4">
                            <div class="mt-3">
                                <strong data-bind="text: $root.texts.currentSupplier ? $root.texts.currentSupplier.name : 'Current:'"></strong>
                                <div class="d-flex align-items-center mt-1">
                                    <img class="icon-sm mr-2" data-bind="attr: { src: $data.getDefaultSupplierIcon() }" style="width: 24px; height: 24px;">
                                    <span data-bind="text: $data.getDefaultSupplierLabel()"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Island Selection for Trade Routes -->
                <div class="mb-4 p-3" data-bind="if: $data.availableTradeIslands().length > 0">
                    <h5 data-bind="text: $root.texts.createTradeRoute ? $root.texts.createTradeRoute.name : 'Create Trade Route'"></h5>
                    <form class="form-inline" style="gap: 1rem;" data-bind="submit: () => $data.createTradeRoute()">
                        <div class="form-group">
                            <label data-bind="text: $root.texts.island ? $root.texts.island.name : 'Island'"></label>
                            <select class="custom-select ml-2"
                                    data-bind="options: $data.availableTradeIslands,
                                               optionsText: i => i.sessionExtendedName(),
                                               value: $data.selectedTradeIsland">
                            </select>
                        </div>

                        <div class="form-group">
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="trade-route-export-checkbox" data-bind="checked: $data.tradeRouteExport">
                                <label class="custom-control-label" for="trade-route-export-checkbox">
                                    <img class="icon-sm icon-light mr-1" data-bind="attr: { src: $data.tradeRouteExport() ? '../icons/icon_transporter_unloading_light.png' : '../icons/icon_transporter_loading_light.png' }">
                                    <span data-bind="text: $data.tradeRouteExport() ? ($root.texts.export ? $root.texts.export.name : 'Export') : ($root.texts.import ? $root.texts.import.name : 'Import')"></span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-group">
                                <input type="number" class="form-control" step="0.1" min="0"
                                       data-bind="value: $data.tradeRouteAmount">
                                <div class="input-group-append">
                                    <span class="input-group-text">t/min</span>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" data-bind="enable: $data.canCreateTradeRoute()">
                            <span class="fa fa-plus"></span>
                            <span data-bind="text: $root.texts.create ? $root.texts.create.name : 'Create'"></span>
                        </button>
                    </form>
                </div>

                <div data-bind="if: $data.instance().demands && $data.instance().totalDemands && $data.instance().totalDemands() > ACCURACY">
                    <collapsible params="id: 'product-config-consumption', heading: $root.texts.consumption.name, collapsed: true, data: $data.instance(), summary: $data.instance().totalDemands">
                        <consumer-view params="product: $data.instance()"></consumer-view>
                    </collapsible>
                </div>

                <!-- Tab Navigation -->
                <ul class="nav nav-tabs" role="tablist">
                    <!-- ko foreach: $data.factoryPresenters -->
                    <li class="nav-item">
                        <a class="nav-link active" data-toggle="tab" data-bind="click: () => $root.productionChain.factory($data.instance()), attr: {'href': '#factories-tab-' + $data.guid()}">
                            <div class="d-flex align-items-center">
                                <span class="icon-light mr-2" data-bind="visible: $data.island().region.id == 'Meta', component: {name: 'asset-icon', params: $data.region()}"></span>
                                <h5 class="mb-0" data-bind="text: $data.name()"></h5>
                            </div>
                        </a>
                    </li>
                     <!-- /ko -->
                    <li class="nav-item" data-bind="visible: $data.tradeListVisible()">
                        <a class="nav-link" data-toggle="tab" href="#trade-routes-tab">
                            <span data-bind="text: $root.texts.tradeRoutes ? $root.texts.tradeRoutes.name : 'Trade Routes'"></span>
                            <span class="badge badge-light ml-1" data-bind="text: $data.tradeList().routes().length"></span>
                        </a>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content mt-3">
                    <!-- Factories Tab -->
                    <div id="factories-tab" class="tab-pane fade show active">
                        <div data-bind="foreach: $data.visibleFactories">
                            <div data-bind="template: { name: 'factory-config-section', data: $data }"></div>
                        </div>
                    </div>

                    <!-- Trade Routes Tab -->
                    <div id="trade-routes-tab" class="tab-pane fade">
                        <table class="table table-striped table-sm">
                            <thead>
                                <tr>
                                    <th data-bind="text: $root.texts.island ? $root.texts.island.name : 'Island'"></th>
                                    <th data-bind="text: $root.texts.direction ? $root.texts.direction.name : 'Direction'"></th>
                                    <th data-bind="text: $root.texts.amount ? $root.texts.amount.name : 'Amount'"></th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody data-bind="foreach: $data.tradeList().routes">
                                <tr>
                                    <td>
                                        <span data-bind="if: $data.getOpposite($parent.tradeList()).session">
                                            <img class="icon-sm icon-light" data-bind="attr: {src: $data.getOpposite($parent.tradeList()).session.icon}" />
                                        </span>
                                        <a href="#" data-bind="text: $data.getOpposite($parent.tradeList()).name, click: () => {$root.island($data.getOpposite($parent.tradeList()))}"></a>
                                    </td>
                                    <td>
                                        <img class="icon-sm icon-light" data-bind="attr: { src: $data.isExport($parent.tradeList()) ? '../icons/icon_transporter_unloading_light.png' : '../icons/icon_transporter_loading_light.png' }">
                                        <span data-bind="text: $data.isExport($parent.tradeList()) ? ($root.texts.export ? $root.texts.export.name : 'Export') : ($root.texts.import ? $root.texts.import.name : 'Import')"></span>
                                    </td>
                                    <td>
                                        <div class="input-group spinner" style="max-width: 12rem">
                                            <input step="0.1" min="0" class="form-control" type="number" value="0" data-bind="value: $data.minAmount, attr: {id: $data.guid + '-amount-input' } " />
                                            <div class="input-group-append">
                                                <div data-bind="component: { name: 'number-input-increment', params: { obs: $data.amount, id: $data.guid + '-amount-input' }}"></div>
                                                <span class="input-group-text">t/min</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <button class="btn btn-secondary btn-sm float-right" data-bind="click: () => $data.delete()">
                                            <span class="fa fa-trash"></span>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>


                </div>

                <div class="mt-4" data-bind="component: { name: 'notes-section', params:{ $data: $data.instance()}}"></div>
            </div>

            <div class="modal-footer">
            </div>
        </div>
    </div>
</div>
